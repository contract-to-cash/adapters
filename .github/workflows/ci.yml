# CI for contract-to-cash/adapters.
#
# The core dependency (github.com/contract-to-cash/core) is published to the
# Go module proxy and pinned in go.mod, so CI builds against the pinned
# version — no core checkout, replace directive, or CORE_REPO_TOKEN needed,
# and fork PRs run the full suite.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: lint + build + unit tests (mysql sqlmock / fincode + stripe httptest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt differences in:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # postgres tests need a live database; they are covered by the
      # integration job, and `go vet ./...` above already type-checks the
      # postgres package (tests included).
      - name: Unit tests (mysql sqlmock, fincode + stripe httptest)
        run: go test ./mysql/... ./fincode/... ./stripe/... -race -count=1

  postgres-integration:
    name: postgres integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: adapters_test
          POSTGRES_PASSWORD: adapters_test
          POSTGRES_DB: adapters_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adapters_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ADAPTERS_TEST_DSN: postgres://adapters_test:adapters_test@localhost:5432/adapters_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Integration tests
        run: go test ./postgres/... -race -count=1

  mysql-integration:
    name: mysql integration tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_USER: adapters_test
          MYSQL_PASSWORD: adapters_test
          MYSQL_DATABASE: adapters_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # multiStatements lets the migration files (multiple DDL statements each)
      # apply in a single Exec; parseTime + loc=UTC keep DATETIME(6) round-trips
      # in UTC. When this DSN is set explicitly, mysqltest.NewDB hard-fails
      # rather than skipping, so a broken database turns CI red.
      ADAPTERS_TEST_MYSQL_DSN: adapters_test:adapters_test@tcp(127.0.0.1:3306)/adapters_test?parseTime=true&loc=UTC&multiStatements=true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Integration tests
        run: go test ./mysql/... -race -count=1
